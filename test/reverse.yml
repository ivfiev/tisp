Features:
  pos: number 
  bro: char
   
Block:
  Attention:
    - Head:
        Query: token.ANY  # shouldn't it be 'token($)' ? do we even need ANY anymore?
        Key: token($) # shouldn't it be 'E', or maybe id() ?
        Value: token.pos()
        Proj: pos
  FeedForward:
    - subtract(pos, token.pos())

Block:
  Attention:
    - Head:
        Query: pos
        Key: token.pos()
        Value: token.emb()
        Proj: bro
  FeedForward:
    - 

Unembed:
  Char: bro 
  Tokens: 1:-1
